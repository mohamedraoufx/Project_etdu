<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام إدارة المعهد التعليمي</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ========== LOGIN PAGE ========== -->
<div id="login-page" class="page active">
  <div class="login-bg">
    <div class="login-particles"></div>
    <div class="login-shapes">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
      <div class="shape s3"></div>
    </div>
  </div>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <div class="logo-icon">🎓</div>
          <h1>معهد بن داود</h1>
          <p> صفحة تسجيل الدخول </p>
        </div>
      </div>
      <div class="login-body">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="login-username" placeholder="أدخل اسم المستخدم" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="أدخل كلمة المرور" />
            <button class="toggle-pw" onclick="togglePassword()">👁</button>
          </div>
        </div>
        <div id="login-error" class="login-error hidden">اسم المستخدم أو كلمة المرور غير صحيحة</div>
        <button class="btn-login" onclick="login()">تسجيل الدخول</button>
        <div class="login-demo">
          <p>حسابات تجريبية:</p>
          <div class="demo-accounts">
            <button onclick="fillDemo('admin','admin123')">👑 المدير</button>
            <button onclick="fillDemo('teacher1','teach123')">👨‍🏫 الأستاذ</button>
            <button onclick="fillDemo('student1','stud123')">👨‍🎓 الطالب</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========== main app ;D ========== -->
 
<div id="app-page" class="page">

  <!-- SIDE -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🎓</div>
      <div class="sidebar-info">
        <span class="sidebar-title">معهد النور</span>
        <span class="sidebar-sub" id="sidebar-role-label"></span>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">👤</div>
      <div class="user-details">
        <span id="sidebar-name">المستخدم</span>
        <span id="sidebar-role-badge" class="role-badge"></span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">🚪 تسجيل الخروج</button>
    </div>
  </aside>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- MAIN CONTENT -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbar-title">لوحة التحكم</div>
      <div class="topbar-actions">
        <div class="notif-btn" onclick="toggleNotifications()">
          🔔 <span class="notif-badge" id="notif-count">0</span>
        </div>
        <div class="topbar-user" id="topbar-user">المستخدم</div>
      </div>
    </header>

    <!-- NOTIFICATION PANEL -->
    <div class="notif-panel hidden" id="notif-panel">
      <div class="notif-header">
        <span>الإشعارات</span>
        <button onclick="clearNotifications()">مسح الكل</button>
      </div>
      <div id="notif-list"></div>
    </div>

    <main class="content" id="main-content">
      <!-- Panels injected here by JS -->
    </main>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
